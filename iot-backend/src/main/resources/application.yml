server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/iot_guard?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  # HS256 要求密钥至少 32 字符（256 位）
  secret: IoTAgentGuard2024SecretKeyForJwtHS256
  expiration: 86400000
